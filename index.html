<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Cannibalization Scanner</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src https://corsproxy.io/ https://api.allorigins.win/; img-src 'self' data:;">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <h1>Content Cannibalization Scanner</h1>
    <p class="subtitle">Find overlapping blog posts that compete for the same search queries</p>

    <!-- Scan Input -->
    <div class="card">
      <h2>Scan Website</h2>
      <div class="input-row">
        <input type="url" id="site-url" placeholder="https://example.com" autocomplete="url">
        <label for="max-posts">Max posts:</label>
        <input type="number" id="max-posts" value="200" min="2" max="1000">
        <button id="scan-btn">Scan</button>
        <button id="cancel-btn" class="danger" style="display:none">Cancel</button>
      </div>
      <label for="exclude-slugs" style="margin-top: 10px; display: block;">Exceptions</label>
      <input type="text" id="exclude-slugs" value="about, about-us, contact, contact-us, privacy, privacy-policy, terms, terms-of-service, terms-and-conditions, cookie-policy, disclaimer, cart, checkout, account, my-account, wishlist, login, register, signup, thank-you, sample-page, home" placeholder="Slugs to exclude (comma-separated)" style="width: 100%; margin-top: 4px;">
      <div id="status" class="status info"></div>
      <div id="progress-bar" class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
        <span id="progress-text" class="progress-text"></span>
      </div>
    </div>


    <!-- Results -->
    <div id="results" style="display:none">
      <div class="card">
        <h2>Results</h2>
        <div id="stats" class="stats"></div>

        <!-- Heatmap -->
        <div id="heatmap"></div>

        <!-- Controls -->
        <div class="controls-row">
          <div class="slider-row">
            <label>Threshold:</label>
            <input type="range" id="threshold" min="0" max="1" step="0.05" value="0.3">
            <span id="threshold-val" class="threshold-val">0.30</span>
          </div>
          <button id="export-csv" class="secondary">Export CSV</button>
        </div>

        <!-- Table -->
        <div id="table-container" class="table-wrapper"></div>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
